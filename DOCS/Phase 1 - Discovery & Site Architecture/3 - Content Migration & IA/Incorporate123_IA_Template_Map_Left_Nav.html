<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incorporate123 — Template Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#faf8f3;--parch:#f3efe6;--warm:#fffdf9;
  --ink:#1a1613;--ink2:#3d3530;--ink3:#7a706a;--ink4:#b0a99f;
  --rule:#ddd7cc;--ruleL:#ece8df;
  --t1:#1e3a5f;--t1s:#e6edf5;--t1b:#b3c7de;
  --t2:#2955a3;--t2s:#e8eef8;--t2b:#a8c0e6;
  --t3:#0f7c8c;--t3s:#e0f4f6;--t3b:#9edce4;
  --t4:#c33;--t4s:#fce8e8;--t4b:#f5b3b3;
  --t5:#b5720a;--t5s:#faf0dd;--t5b:#f0d49a;
  --t6:#1d7a3f;--t6s:#e4f4ea;--t6b:#a5dbb8;
  --t7:#7a3dac;--t7s:#f1e8f9;--t7b:#d0b3e8;
  --t8:#d35c1a;--t8s:#fdeee2;--t8b:#f5c8a0;
  --t9:#666;--t9s:#f0eeeb;--t9b:#ccc8c2;
  --priv:#2955a3;--asset:#1d7a3f;--form:#b5720a;--comp:#7a3dac;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;}

/* ═══ TOP BAR ═══ */
.topbar{height:50px;border-bottom:2px solid var(--ink);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;background:var(--cream);z-index:10;}
.topbar h1{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;letter-spacing:-.02em;}
.topbar .sep{width:1px;height:22px;background:var(--rule);}
.topbar .meta{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--ink3);letter-spacing:.06em;}
.topbar .totals{margin-left:auto;display:flex;gap:.75rem;}
.topbar .tot{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--ink3);}
.topbar .tot strong{color:var(--ink);font-size:.75rem;}

/* ═══ SPLIT ═══ */
.split{display:flex;height:calc(100vh - 50px);}

/* LEFT NAV */
.left{width:260px;min-width:260px;border-right:1px solid var(--rule);background:var(--warm);overflow-y:auto;padding:.75rem 0;flex-shrink:0;}
.left-heading{font-family:'IBM Plex Mono',monospace;font-size:.52rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink4);padding:0 .85rem .5rem;}
.tpl-btn{display:flex;align-items:center;gap:.55rem;width:100%;padding:.55rem .85rem;border:none;background:none;cursor:pointer;text-align:left;border-left:3px solid transparent;transition:all .12s;font-family:inherit;}
.tpl-btn:hover{background:var(--parch);}
.tpl-btn.active{background:var(--parch);border-left-color:var(--ink);}
.tpl-btn .tnum{font-family:'Fraunces',serif;font-size:.95rem;font-weight:700;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;}
.tpl-btn .tinfo{flex:1;min-width:0;}
.tpl-btn .tname{font-size:.74rem;font-weight:600;color:var(--ink);display:block;line-height:1.2;}
.tpl-btn .tmeta{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--ink4);display:flex;gap:.5rem;margin-top:.1rem;}
.complexity-bar{display:flex;gap:1.5px;align-items:center;}
.complexity-bar .cb{width:3.5px;height:8px;border-radius:1.5px;background:var(--ruleL);}
.complexity-bar .cb.on{background:currentColor;}

/* RIGHT */
.right{flex:1;overflow-y:auto;padding:0;}
.right-inner{max-width:960px;padding:1.25rem 1.75rem 3rem;}

/* Detail header */
.detail-head{margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:2px solid var(--rule);}
.dh-top{display:flex;align-items:center;gap:.65rem;margin-bottom:.5rem;}
.dh-num{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;}
.detail-head h2{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:700;letter-spacing:-.02em;}
.dh-badge{font-family:'IBM Plex Mono',monospace;font-size:.52rem;font-weight:600;padding:.22rem .6rem;border-radius:5px;margin-left:auto;letter-spacing:.04em;white-space:nowrap;}
.dh-desc{font-size:.82rem;color:var(--ink3);line-height:1.55;max-width:680px;}

/* Two-col grid */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem;}
.detail-box{background:var(--warm);border:1px solid var(--rule);border-radius:9px;padding:.85rem;}
.detail-box h4{font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:.5rem;}
.detail-box ul{list-style:none;}
.detail-box li{font-size:.74rem;color:var(--ink2);padding:.22rem 0 .22rem .85rem;position:relative;line-height:1.4;}
.detail-box li::before{content:'\2022';position:absolute;left:0;color:var(--ink4);}
.comp-tags{display:flex;flex-wrap:wrap;gap:.25rem;}
.comp-tag{font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;padding:.18rem .45rem;border-radius:4px;}

/* Pages */
.pages-head{font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);margin-bottom:.5rem;padding-top:.85rem;border-top:1px solid var(--rule);}
.page-list{display:flex;flex-wrap:wrap;gap:.35rem;}
.pg{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;border-radius:7px;border:1.5px solid var(--rule);background:var(--warm);transition:all .15s;cursor:default;position:relative;}
.pg:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.05);}
.pg .pg-num{font-family:'Fraunces',serif;font-size:.55rem;font-weight:700;width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;}
.pg .pg-name{font-size:.66rem;font-weight:600;color:var(--ink);line-height:1.2;}
.pg .pg-url{font-family:'IBM Plex Mono',monospace;font-size:.48rem;color:var(--ink4);}
.pg .pg-pri{position:absolute;top:-4px;right:-4px;width:13px;height:13px;border-radius:50%;font-family:'IBM Plex Mono',monospace;font-size:.4rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--warm);}
.pg-pri.p1{background:#16a34a;color:white;}
.pg-pri.p2{background:#d97706;color:white;}
.pg.pil-priv{border-left:3px solid var(--priv);}
.pg.pil-asset{border-left:3px solid var(--asset);}
.pg.pil-form{border-left:3px solid var(--form);}
.pg.pil-comp{border-left:3px solid var(--comp);}
.flow-arrow{display:flex;align-items:center;color:var(--ink4);font-size:.7rem;padding:0 .05rem;}

@media(max-width:860px){
  body{overflow:auto;height:auto;}
  .split{flex-direction:column;height:auto;}
  .left{width:100%;min-width:0;overflow:visible;display:flex;flex-wrap:wrap;gap:0;padding:.4rem;border-right:none;border-bottom:1px solid var(--rule);}
  .left-heading{width:100%;padding:.2rem .4rem;}
  .tpl-btn{width:auto;flex:0 0 auto;padding:.35rem .5rem;border-left:none;border-bottom:2px solid transparent;border-radius:5px;}
  .tpl-btn.active{border-bottom-color:var(--ink);background:var(--parch);}
  .tpl-btn .tnum{width:20px;height:20px;font-size:.7rem;border-radius:4px;}
  .tpl-btn .tmeta{display:none;}
  .right-inner{padding:.85rem;}
  .detail-grid{grid-template-columns:1fr;}
}
</style>
</head>

    <button class="tpl-btn" data-t="8" onclick="show(8)"><div class="tnum" style="background:var(--t8)">8</div><div class="tinfo"><span class="tname">Checkout Flow</span><span class="tmeta"><span>4 steps</span><span class="complexity-bar" style="color:var(--t8)"><span class="cb on"></span><span class="cb on"></span><span class="cb on"></span><span class="cb on"></span><span class="cb on"></span></span></span></div></button>
    <button class="tpl-btn" data-t="9" onclick="show(9)"><div class="tnum" style="background:var(--t9)">9</div><div class="tinfo"><span class="tname">Utility Pages</span><span class="tmeta"><span>16 pg</span><span class="complexity-bar" style="color:var(--t9)"><span class="cb on"></span><span class="cb"></span><span class="cb"></span><span class="cb"></span><span class="cb"></span></span></span></div></button>

function show(t){
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.toggle('active',b.dataset.t==t));
  const d=T[t],cv=d.color,rc=document.getElementById('rc');
  let ph='';
  if(d.pages[0]&&d.pages[0].flow){
    ph=d.pages.map((p,i)=>{
      const a=i<d.pages.length-1?'<span class="flow-arrow">\u2192</span>':'';
      return `<div class="pg"><div class="pg-num" style="background:var(${cv})">${t}</div><div class="pg-info"><span class="pg-name">${p.n}</span><span class="pg-url">${p.u}</span></div><span class="pg-pri p${p.pri}">P${p.pri}</span></div>${a}`;
    }).join('');
  } else {
    ph=d.pages.map(p=>{
      const pc=p.pil?` pil-${p.pil}`:'';
      return `<div class="pg${pc}"><div class="pg-num" style="background:var(${cv})">${t}</div><div class="pg-info"><span class="pg-name">${p.n}</span><span class="pg-url">${p.u}</span></div><span class="pg-pri p${p.pri}">P${p.pri}</span></div>`;
    }).join('');
  }
  rc.innerHTML=`
<div class="detail-head">
  <div class="dh-top"><div class="dh-num" style="background:var(${cv})">${t}</div><h2>${d.name}</h2><div class="dh-badge" style="background:var(${cv}s);color:var(${cv});border:1px solid var(${cv}b);">${d.proto}</div></div>
  <p class="dh-desc">${d.desc}</p>
</div>
<div class="detail-grid">
  <div class="detail-box"><h4>Key Interactions to Build</h4><ul>${d.interactions.map(i=>`<li>${i}</li>`).join('')}</ul></div>
  <div class="detail-box"><h4>Components Required</h4><div class="comp-tags">${d.components.map(c=>`<span class="comp-tag" style="background:var(${cv}s);color:var(${cv});border:1px solid var(${cv}b);">${c}</span>`).join('')}</div></div>
</div>
<div class="pages-head">Pages Using This Template \u2014 ${d.count}</div>
<div class="page-list">${ph}</div>`;
  document.querySelector('.right').scrollTop=0;
}
document.addEventListener('DOMContentLoaded',()=>show(1));
</script>
</body>
</html>
